<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tate-align — テスト</title>
  <style>
    :root {
      --bg: #f6f7f9; --panel: #fff; --border: #d6dae0; --text: #1c2024;
      --pass-bg: #e7f6ec; --pass: #1a7f37; --fail-bg: #fde8e8; --fail: #c62828;
      --mono: ui-monospace, "Cascadia Mono", Consolas, "BIZ UDGothic", "MS Gothic", monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #14171a; --panel: #1d2126; --border: #333a42; --text: #e6e9ec;
        --pass-bg: #16311f; --pass: #4ac06a; --fail-bg: #3a1b1b; --fail: #ff6b6b;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 1.5rem; background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Meiryo, sans-serif;
    }
    h1 { font-size: 1.3rem; }
    #summary { font-size: 1.1rem; font-weight: 700; padding: 0.5rem 0.9rem; border-radius: 6px; display: inline-block; }
    #summary.ok { background: var(--pass-bg); color: var(--pass); }
    #summary.ng { background: var(--fail-bg); color: var(--fail); }
    .case { border: 1px solid var(--border); border-radius: 6px; margin: 0.4rem 0; padding: 0.4rem 0.7rem; background: var(--panel); }
    .case.pass .case-head { color: var(--pass); }
    .case.fail { background: var(--fail-bg); }
    .case.fail .case-head { color: var(--fail); font-weight: 700; }
    .case-head { font-size: 0.92rem; }
    pre.diff {
      font-family: var(--mono); font-size: 0.85rem; white-space: pre; overflow-x: auto;
      background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 0.5rem; margin: 0.4rem 0 0;
    }
  </style>
</head>
<body>
  <h1>tate-align テストランナー</h1>
  <div id="summary">実行中…</div>
  <div id="results"></div>

  <script src="app.js"></script>
  <script src="tests.js"></script>
</body>
</html>
